name: "Github Config Sync"
description: "Home Assistant app for GitHub config sync operations, not backups."
version: "0.2.30"
slug: "github_config_sync_web"
url: "https://github.com/MJP-76/GithubConfigSync"
init: false
startup: services
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:github
panel_title: Github Config Sync
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
map:
  - config:rw
  - addon_configs:rw
  - media:rw
  - share:rw
  - ssl
  - backups:rw
  - www:rw
ports:
  8099/tcp: null
ports_description:
  8099/tcp: "Web UI (optional when using ingress)"
options:
  github_repository: ""
  github_branch: "main"
  github_token: ""
  sync_interval_minutes: 1440
  version_retention_count: 7
  dry_run: true
  include_addon_configs: true
  include_media: false
  include_share: false
  include_ssl: true
  include_backups: false
  include_www: true
schema:
  github_repository: str?
  github_branch: str
  github_token: password?
  sync_interval_minutes: int(5,1440)
  version_retention_count: int(1,100)
  dry_run: bool
  include_addon_configs: bool
  include_media: bool
  include_share: bool
  include_ssl: bool
  include_backups: bool
  include_www: bool
